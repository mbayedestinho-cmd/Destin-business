<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0; padding: 0;
    font-family: "Source Sans Pro", -apple-system, BlinkMacSystemFont, sans-serif;
    background: transparent;
  }
  .zone {
    border: 1px dashed #857f73;
    border-radius: 8px;
    padding: 10px 12px;
    color: #eae4d8;
  }
  .zone input[type="file"] {
    width: 100%;
    color: #eae4d8;
    font-size: 0.92rem;
  }
  .statut {
    font-size: 0.8rem;
    color: #a8a29a;
    margin-top: 6px;
    min-height: 1.1em;
  }
  .statut.ok { color: #7fbf8e; }
  .statut.erreur { color: #e08a8a; }
</style>
</head>
<body>
  <div class="zone">
    <input type="file" id="fichierInput" accept="image/jpeg,image/png,image/webp" />
    <div class="statut" id="statutEl"></div>
  </div>
  <canvas id="toileCache" style="display:none;"></canvas>

<script>
  // ---- Protocole minimal de communication avec Streamlit (sans dépendance
  // npm) : Streamlit écoute les postMessage de ce type précis. Voir la doc
  // "Create a Static Component" -- ce protocole est stable et public. ----
  function envoyerAuParent(type, donnees) {
    var message = Object.assign({ isStreamlitMessage: true, type: type }, donnees);
    window.parent.postMessage(message, "*");
  }
  function signalerPret() {
    envoyerAuParent("streamlit:componentReady", { apiVersion: 1 });
  }
  function definirHauteur(hauteur) {
    envoyerAuParent("streamlit:setFrameHeight", { height: hauteur });
  }
  function envoyerValeur(valeur) {
    envoyerAuParent("streamlit:setComponentValue", { value: valeur });
  }

  // Réglages de compression -- ramène toute photo à une taille raisonnable
  // pour un envoi rapide et fiable même sur une connexion mobile instable.
  var LARGEUR_MAX = 1600;
  var QUALITE_JPEG = 0.82;
  var TAILLE_MAX_SORTIE_MO = 3;

  var inputEl = document.getElementById("fichierInput");
  var statutEl = document.getElementById("statutEl");
  var toile = document.getElementById("toileCache");

  function definirStatut(texte, classe) {
    statutEl.textContent = texte;
    statutEl.className = "statut" + (classe ? " " + classe : "");
  }

  inputEl.addEventListener("change", function (evenement) {
    var fichier = evenement.target.files && evenement.target.files[0];
    if (!fichier) {
      envoyerValeur(null);
      definirStatut("");
      return;
    }

    definirStatut("Compression en cours…");

    var lecteur = new FileReader();
    lecteur.onerror = function () {
      definirStatut("Impossible de lire le fichier.", "erreur");
      envoyerValeur(null);
    };
    lecteur.onload = function (evt) {
      var image = new Image();
      image.onerror = function () {
        definirStatut("Fichier image invalide.", "erreur");
        envoyerValeur(null);
      };
      image.onload = function () {
        var largeur = image.width;
        var hauteur = image.height;
        if (largeur > LARGEUR_MAX) {
          hauteur = Math.round(hauteur * (LARGEUR_MAX / largeur));
          largeur = LARGEUR_MAX;
        }
        toile.width = largeur;
        toile.height = hauteur;
        var ctx = toile.getContext("2d");
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, largeur, hauteur);
        ctx.drawImage(image, 0, 0, largeur, hauteur);

        var qualite = QUALITE_JPEG;
        var dataUrl = toile.toDataURL("image/jpeg", qualite);
        // Si malgré tout le résultat reste lourd (grande photo très détaillée),
        // on réduit encore un peu la qualité plutôt que d'envoyer un gros fichier.
        var tailleOctetsApprox = function (durl) {
          return Math.round((durl.length - durl.indexOf(",") - 1) * 0.75);
        };
        var tentatives = 0;
        while (tailleOctetsApprox(dataUrl) > TAILLE_MAX_SORTIE_MO * 1024 * 1024 && qualite > 0.4 && tentatives < 4) {
          qualite -= 0.12;
          dataUrl = toile.toDataURL("image/jpeg", qualite);
          tentatives += 1;
        }

        var tailleMo = (tailleOctetsApprox(dataUrl) / (1024 * 1024)).toFixed(2);
        definirStatut("✓ Prêt à envoyer (" + tailleMo + " Mo, compressé)", "ok");
        envoyerValeur({ nom: fichier.name, donnees: dataUrl });
      };
      image.src = evt.target.result;
    };
    lecteur.readAsDataURL(fichier);
  });

  window.addEventListener("message", function (evenement) {
    if (evenement.data && evenement.data.type === "streamlit:render") {
      definirHauteur(64);
    }
  });

  signalerPret();
  definirHauteur(64);
</script>
</body>
</html>
